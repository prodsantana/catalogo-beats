<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTANA BEATS | Official Store</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 0; }
        header { border-bottom: 3px solid #ff3e3e; padding: 30px; text-align: center; background: #000; }
        h1 { color: #ff3e3e; letter-spacing: 5px; font-size: 2.5rem; margin: 0; }
        
        .main-content { display: flex; max-width: 1200px; margin: 20px auto; padding: 20px; gap: 30px; }
        
        /* MENÚ LATERAL DE GÉNEROS */
        .sidebar { width: 250px; background: #161616; padding: 20px; border-radius: 10px; height: fit-content; border: 1px solid #333; }
        .sidebar h3 { color: #ff3e3e; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .sidebar ul { list-style: none; padding: 0; text-align: left; }
        .sidebar li { margin: 15px 0; font-weight: bold; color: #ccc; }
        .sidebar a { color: #fff; text-decoration: none; font-size: 0.9rem; }
        .sidebar a:hover { color: #ff3e3e; }

        /* LISTA DE BEATS */
        .catalogo { flex: 1; }
        .beat-card { 
            background: #161616; margin-bottom: 20px; padding: 20px; 
            border-radius: 12px; border: 1px solid #333; display: flex; 
            flex-direction: column; align-items: stretch;
        }
        .info-beat { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nombre-beat { font-size: 1.5rem; font-weight: bold; color: #fff; }
        .genero-tag { background: #ff3e3e; padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; }
        
        audio { width: 100%; margin: 15px 0; filter: invert(1); }
        .boton-pago { background: #ff3e3e; color: white; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; text-align: center; }
        
        @media (max-width: 768px) { .main-content { flex-direction: column; } .sidebar { width: auto; } }
    </style>
</head>
<body>

<header>
    <h1>SANTANA BEATS</h1>
</header>

<div class="main-content">
    
    <aside class="sidebar">
        <h3>GÉNEROS</h3>
        <ul>
            <li>🔥 REGGAETON
                <br><small>Fuego Eterno, Solo Flow...</small>
            </li>
            <li>🎸 BOOMBAP
                <br><small>Old School, Street Soul...</small>
            </li>
            <li>🎹 TRAP / DETROIT
                <br><small>Moonlight, Nightmare...</small>
            </li>
        </ul>
        <p style="font-size: 0.8rem; color: #666; margin-top: 20px;">Haz clic en el beat para comprar</p>
    </aside>

    <div class="catalogo" id="lista-beats">

        <div class="beat-card">
            <div class="info-beat">
                <span class="nombre-beat">MOONLIGHT</span> 
                <span class="genero-tag">TRAP</span>
            </div>
            <small>80 BPM</small>
            <audio controls><source src="beat3.mp3" type="audio/mpeg"></audio>
            <a href="LINK_MP" class="boton-pago">COMPRAR ($29.99)</a>
        </div>

        <div class="beat-card">
            <div class="info-beat">
                <span class="nombre-beat">FUEGO ETERNO</span> 
                <span class="genero-tag">REGGAETON</span>
            </div>
            <small>92 BPM</small>
            <audio controls><source src="beat2.mp3" type="audio/mpeg"></audio>
            <a href="LINK_MP" class="boton-pago">COMPRAR ($29.99)</a>
        </div>

        </div>
</div>

</body>
</html>
